# Phase 1 rim firmware configuration (spec section 9).

# Rim-Link adapter v1
CONFIG_RIMLINK_LEGACY_SPI=y
CONFIG_RIM_IDENTITY=3

# Link transport: SPI peripheral (slave) mode
CONFIG_SPI=y
CONFIG_SPI_SLAVE=y
# TODO(phase1): enable DMA once devicetree dmas/dma-names are assigned
# CONFIG_SPI_STM32_DMA=y
# TODO(phase1): non-cacheable link buffers (mandatory with D-cache + DMA on H7)
# CONFIG_NOCACHE_MEMORY=y

# Inputs
CONFIG_GPIO=y
# TODO(phase1): CONFIG_ADC=y for the D-pad ladder (hardware spec section 5)

# Diagnostics
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y   # structural fast-path protection (spec section 3.1)
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PRINTK=y
CONFIG_SHELL=y

# Instrumentation
CONFIG_TIMING_FUNCTIONS=y
