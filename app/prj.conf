# Rim firmware configuration (spec section 9).

# Rim-Link adapter v1
CONFIG_RIMLINK_LEGACY_SPI=y
CONFIG_RIM_IDENTITY=3

# Link transport: SPI peripheral (slave) mode
CONFIG_SPI=y
CONFIG_SPI_SLAVE=y
# TODO(perf): DMA + non-cacheable link buffers once devicetree
# dmas/dma-names are assigned and re-arm latency is measured (spec s.10)
# CONFIG_SPI_STM32_DMA=y
# CONFIG_NOCACHE_MEMORY=y

# Inputs
CONFIG_GPIO=y
CONFIG_ADC=y

# Settings schema v2 (spec 3-S5): NVS-backed persistence
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# Diagnostics
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y   # structural fast-path protection (spec s.3.1)
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PRINTK=y
CONFIG_SHELL=y

# Instrumentation
CONFIG_TIMING_FUNCTIONS=y

# Race-display LCD (spec 4-S1): LVGL UI, enabled together with a
# `chosen zephyr,display` node in the overlay (PCB rev A):
# CONFIG_DISPLAY=y
# CONFIG_LVGL=y
# CONFIG_LV_FONT_MONTSERRAT_48=y
# CONFIG_LV_Z_MEM_POOL_SIZE=32768
# Note: The flash partition map has been expanded to 384 KiB slots.
# Since the full LVGL build is ~420 KiB, you must still prune unused
# LVGL widgets/themes (e.g. CONFIG_LV_USE_THEME_DEFAULT=n) to fit.

# Reset-cause attribution (spec 4-S6 / health counters)
CONFIG_HWINFO=y
