# Phase 1 rim firmware configuration (spec section 9).

# Rim-Link adapter v1
CONFIG_RIMLINK_LEGACY_SPI=y
CONFIG_RIM_IDENTITY=3

# Link transport: SPI peripheral (slave) mode
CONFIG_SPI=y
CONFIG_SPI_SLAVE=y
# TODO(phase2-perf): DMA + non-cacheable link buffers once devicetree
# dmas/dma-names are assigned and re-arm latency is measured (spec s.10)
# CONFIG_SPI_STM32_DMA=y
# CONFIG_NOCACHE_MEMORY=y

# Inputs
CONFIG_GPIO=y
CONFIG_ADC=y

# Diagnostics
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y   # structural fast-path protection (spec s.3.1)
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PRINTK=y
CONFIG_SHELL=y

# Instrumentation
CONFIG_TIMING_FUNCTIONS=y
