# Phase 5 verified boot (spec 5-S1): MCUboot chained before the app.
SB_CONFIG_BOOTLOADER_MCUBOOT=y
# ED25519 via MCUboot's bundled tinycrypt: no extra crypto module in
# the manifest. Dev signing key = MCUboot's root-ed25519.pem;
# production key management: docs/update-recovery.md.
SB_CONFIG_BOOT_SIGNATURE_TYPE_ED25519=y
