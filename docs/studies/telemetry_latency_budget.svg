<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 460" font-family="Helvetica, Arial, sans-serif"><defs></defs><rect x="0" y="0" width="1050" height="460" fill="#F7F5F0"/><text x="30" y="42" font-size="24" font-weight="bold" fill="#1E2530" font-family="Helvetica, Arial, sans-serif">Telemetry latency is stage-additive</text><text x="30" y="66" font-size="14" fill="#5A6270" font-family="Helvetica, Arial, sans-serif">Total lag = game publish + host mapping + transport + device render; measure each stage, not just the end</text><rect x="90" y="150" width="234.0" height="70" rx="4" fill="#33587D" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="207.0" y="183.0" font-size="12.5" fill="white" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Game publish</text><text x="207.0" y="201.0" font-size="11" fill="white" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">30%</text><rect x="324.0" y="150" width="171.6" height="70" rx="4" fill="#4E7A4E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="409.8" y="183.0" font-size="12.5" fill="white" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Host acquire + map</text><text x="409.8" y="201.0" font-size="11" fill="white" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">22%</text><rect x="495.6" y="150" width="140.4" height="70" rx="4" fill="#C97A3E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="565.8000000000001" y="183.0" font-size="12.5" fill="white" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Transport (serial/USB)</text><text x="565.8000000000001" y="201.0" font-size="11" fill="white" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">18%</text><rect x="636.0" y="150" width="234.0" height="70" rx="4" fill="#7A5C99" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="753.0" y="183.0" font-size="12.5" fill="white" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Device render</text><text x="753.0" y="201.0" font-size="11" fill="white" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">30%</text><line x1="90" y1="238" x2="870" y2="238" stroke="#1E2530" stroke-width="1.5" stroke-linecap="butt"/><line x1="90" y1="232" x2="90" y2="244" stroke="#1E2530" stroke-width="1.5" stroke-linecap="butt"/><line x1="870" y1="232" x2="870" y2="244" stroke="#1E2530" stroke-width="1.5" stroke-linecap="butt"/><text x="480.0" y="260" font-size="13" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">end-to-end latency (target: under one game frame)</text><text x="90" y="136" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">one frame budget</text><text x="90" y="320" font-size="12.5" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Percentages are illustrative, not measured. Latency-sensitive effects (LEDs, tactile) should be</text><text x="90" y="340" font-size="12.5" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">prioritised over numeric fields; measure each stage independently so the dominant contributor is visible.</text></svg>