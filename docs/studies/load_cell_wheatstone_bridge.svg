<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 620">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#1E2530"/></marker></defs>
<rect x="0" y="0" width="1150" height="620" fill="#F7F5F0"/><text x="30" y="42" font-size="24" font-weight="bold" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">Load cell: strain gauges in a Wheatstone bridge</text><text x="30" y="66" font-size="14" fill="#555" font-family="Helvetica,Arial,sans-serif">How a brake pedal's force turns into a tiny voltage the ADC can read</text><text x="40" y="110" font-size="16" font-weight="bold" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">A. Sensing element (load cell beam)</text><rect x="40" y="180" width="22" height="160" fill="#B9C2CC" stroke="#1E2530" stroke-width="2"/><line x1="40" y1="185" x2="30" y2="199" stroke="#1E2530" stroke-width="1.5"/><line x1="40" y1="205" x2="30" y2="219" stroke="#1E2530" stroke-width="1.5"/><line x1="40" y1="225" x2="30" y2="239" stroke="#1E2530" stroke-width="1.5"/><line x1="40" y1="245" x2="30" y2="259" stroke="#1E2530" stroke-width="1.5"/><line x1="40" y1="265" x2="30" y2="279" stroke="#1E2530" stroke-width="1.5"/><line x1="40" y1="285" x2="30" y2="299" stroke="#1E2530" stroke-width="1.5"/><line x1="40" y1="305" x2="30" y2="319" stroke="#1E2530" stroke-width="1.5"/><line x1="40" y1="325" x2="30" y2="339" stroke="#1E2530" stroke-width="1.5"/><rect x="62" y="240" width="300" height="20" fill="none" stroke="#1E2530" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/><path d="M62,246 L362,286 L362,306 L62,266 Z" fill="#B9C2CC" stroke="#1E2530" stroke-width="2"/><rect x="90" y="240" width="46" height="9" fill="#B4423A" stroke="#1E2530" stroke-width="1" transform="rotate(6 113 244)"/><rect x="90" y="270" width="46" height="9" fill="#33587D" stroke="#1E2530" stroke-width="1" transform="rotate(6 113 274)"/><line x1="345" y1="230" x2="345" y2="285" stroke="#1E2530" stroke-width="3" marker-end="url(#arrow)"/><text x="352" y="235" font-size="14" font-weight="bold" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">F (pedal force)</text><text x="45" y="365" font-size="12.5" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">Fixed end (frame-mounted)</text><text x="200" y="405" font-size="12.5" fill="#B4423A" font-family="Helvetica,Arial,sans-serif">■ top gauges stretch (tension, R₁ R₃) → R↑</text><text x="200" y="425" font-size="12.5" fill="#33587D" font-family="Helvetica,Arial,sans-serif">■ bottom gauges squeeze (compression, R₂ R₄) → R↓</text><text x="45" y="460" font-size="12.5" fill="#555" font-family="Helvetica,Arial,sans-serif" font-style="italic">Bend is exaggerated for clarity — real deflection is a fraction of a millimeter.</text><text x="580" y="90" font-size="16" font-weight="bold" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">B. Full Wheatstone bridge (4 active gauges)</text><path d="M 620.0,330.0 L 647.1,317.1 L 652.9,282.9 L 687.1,277.1 L 692.9,242.9 L 727.1,237.1 L 732.9,202.9 L 760.0,190.0" fill="none" stroke="#B4423A" stroke-width="3"/><path d="M 760.0,190.0 L 772.9,217.1 L 807.1,222.9 L 812.9,257.1 L 847.1,262.9 L 852.9,297.1 L 887.1,302.9 L 900.0,330.0" fill="none" stroke="#33587D" stroke-width="3"/><path d="M 900.0,330.0 L 872.9,342.9 L 867.1,377.1 L 832.9,382.9 L 827.1,417.1 L 792.9,422.9 L 787.1,457.1 L 760.0,470.0" fill="none" stroke="#B4423A" stroke-width="3"/><path d="M 760.0,470.0 L 747.1,442.9 L 712.9,437.1 L 707.1,402.9 L 672.9,397.1 L 667.1,362.9 L 632.9,357.1 L 620.0,330.0" fill="none" stroke="#33587D" stroke-width="3"/><circle cx="760" cy="190" r="4" fill="#1E2530"/><circle cx="900" cy="330" r="4" fill="#1E2530"/><circle cx="760" cy="470" r="4" fill="#1E2530"/><circle cx="620" cy="330" r="4" fill="#1E2530"/><text x="645" y="260" font-size="13" font-weight="bold" fill="#B4423A" font-family="Helvetica,Arial,sans-serif">R₁ (tension)</text><text x="800" y="260" font-size="13" font-weight="bold" fill="#33587D" font-family="Helvetica,Arial,sans-serif">R₂ (compression)</text><text x="775" y="445" font-size="13" font-weight="bold" fill="#B4423A" font-family="Helvetica,Arial,sans-serif">R₃ (tension)</text><text x="625" y="445" font-size="13" font-weight="bold" fill="#33587D" font-family="Helvetica,Arial,sans-serif">R₄ (compression)</text><line x1="760" y1="190" x2="760" y2="150" stroke="#3A4048" stroke-width="2"/><text x="690" y="140" font-size="13" font-weight="bold" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">V+ excitation (e.g. 5V)</text><line x1="760" y1="470" x2="760" y2="500" stroke="#3A4048" stroke-width="2"/><line x1="746" y1="500" x2="774" y2="500" stroke="#3A4048" stroke-width="2"/><line x1="752" y1="506" x2="768" y2="506" stroke="#3A4048" stroke-width="2"/><line x1="757" y1="512" x2="763" y2="512" stroke="#3A4048" stroke-width="2"/><text x="780" y="505" font-size="13" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">GND</text><line x1="620" y1="330" x2="960" y2="282" stroke="#3A4048" stroke-width="2"/><line x1="900" y1="330" x2="960" y2="318" stroke="#3A4048" stroke-width="2"/><text x="525" y="322" font-size="12" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">V_out–</text><text x="908" y="322" font-size="12" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">V_out+</text><path d="M960,270 L960,330 L1010,300 Z" fill="#C97A3E" stroke="#1E2530" stroke-width="2"/><text x="967" y="350" font-size="12.5" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">INA</text><rect x="1040" y="276" width="70" height="48" fill="#B9C2CC" stroke="#1E2530" stroke-width="2"/><text x="1052" y="305" font-size="14" font-weight="bold" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">ADC</text><line x1="1010" y1="300" x2="1040" y2="300" stroke="#3A4048" stroke-width="2"/><text x="580" y="530" font-size="12.5" fill="#555" font-family="Helvetica,Arial,sans-serif">All four arms are active gauges: opposite arms move in opposite directions,</text><text x="580" y="548" font-size="12.5" fill="#555" font-family="Helvetica,Arial,sans-serif">which roughly doubles sensitivity and cancels temperature drift common to all four.</text><text x="580" y="575" font-size="12.5" fill="#1E2530" font-family="Helvetica,Arial,sans-serif" font-weight="bold">V_out is microvolts-to-millivolts — this is why an instrumentation</text><text x="580" y="593" font-size="12.5" fill="#1E2530" font-family="Helvetica,Arial,sans-serif" font-weight="bold">amplifier (INA) sits between the bridge and the ADC.</text>
</svg>