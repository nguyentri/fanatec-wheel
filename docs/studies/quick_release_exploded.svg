<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="Helvetica, Arial, sans-serif"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9,5 L0,9 Z" fill="#1E2530"/></marker></defs><rect x="0" y="0" width="1100" height="560" fill="#F7F5F0"/><text x="30" y="42" font-size="24" font-weight="bold" fill="#1E2530" font-family="Helvetica, Arial, sans-serif">Quick release (QR): mechanical coupling + power/data bridge</text><text x="30" y="66" font-size="14" fill="#5A6270" font-family="Helvetica, Arial, sans-serif">Base-Side and Wheel-Side must be the same generation; the QR carries torque and, for smart rims, power + data</text><rect x="620" y="230" width="120" height="140" rx="8" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="680" y="216" font-size="13" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Base-Side</text><text x="680" y="392" font-size="11" fill="#5A6270" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">(on wheel base shaft)</text><polygon points="620,270 550,278 550,322 620,330" fill="#8A93A0" stroke="#1E2530" stroke-width="1.5"/><circle cx="560" cy="286" r="5" fill="#C9A23E" stroke="#1E2530" stroke-width="1" opacity="1"/><circle cx="560" cy="300" r="5" fill="#C9A23E" stroke="#1E2530" stroke-width="1" opacity="1"/><circle cx="560" cy="314" r="5" fill="#C9A23E" stroke="#1E2530" stroke-width="1" opacity="1"/><text x="560" y="346" font-size="10" fill="#8F4E23" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">pogo pins</text><rect x="740" y="284" width="120" height="32" rx="0" fill="#8A93A0" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="800" y="305" font-size="11" fill="white" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">motor shaft</text><rect x="240" y="230" width="120" height="140" rx="8" fill="#33587D" stroke="#1E2530" stroke-width="1.5" opacity="0.9"/><text x="300" y="216" font-size="13" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Wheel-Side</text><text x="300" y="392" font-size="11" fill="#5A6270" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">(on steering wheel)</text><polygon points="360,270 430,278 430,322 360,330" fill="#F7F5F0" stroke="#1E2530" stroke-width="1.5"/><rect x="400" y="282" width="20" height="8" rx="0" fill="#C9A23E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><rect x="400" y="296" width="20" height="8" rx="0" fill="#C9A23E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><rect x="400" y="310" width="20" height="8" rx="0" fill="#C9A23E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="410" y="346" font-size="10" fill="#8F4E23" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">contact pads</text><circle cx="220" cy="300" r="40" fill="#F7F5F0" stroke="#1E2530" stroke-width="3" opacity="1"/><text x="220" y="304" font-size="11" fill="#5A6270" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">rim</text><line x1="440" y1="250" x2="510" y2="250" stroke="#1E2530" stroke-width="2" marker-end="url(#arrow)"/><line x1="540" y1="250" x2="470" y2="250" stroke="#1E2530" stroke-width="2" marker-end="url(#arrow)"/><text x="490.0" y="242" font-size="12" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">lock together</text><rect x="360.0" y="370" width="260" height="74" rx="8" fill="#EFEBE1" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="490.0" y="392" font-size="12.5" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Across the coupling:</text><text x="490.0" y="412" font-size="12" fill="#1E2530" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">• mechanical torque (all rims)</text><text x="490.0" y="430" font-size="12" fill="#1E2530" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">• power + data (smart rims only)</text><rect x="760" y="130" width="320" height="185" rx="8" fill="#EFEBE1" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="778" y="158" font-size="14" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Generation must match</text><text x="778" y="182" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">QR1 and QR2 shapes do not mate.</text><text x="778" y="199" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Both halves must be the same</text><text x="778" y="216" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">generation, and high-torque</text><text x="778" y="233" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">approval is model-specific.</text><text x="778" y="250" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif"></text><text x="778" y="267" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">A shared bolt pattern on the hub</text><text x="778" y="284" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">does NOT prove the QR or the</text><text x="778" y="301" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">electrical link is compatible.</text></svg>