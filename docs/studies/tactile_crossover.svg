="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Keeping shaker energy inside the green band prevents it from summing into FFB torque (purple) or driving</text><text x="110" y="450" font-size="12.5" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">a structural resonance (red). Actual resonance frequencies are rig-specific and must be measured, not assumed.</text><rect x="810" y="110" width="210" height="250" rx="8" fill="#EFEBE1" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="828" y="138" font-size="14" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Commissioning</text><text x="828" y="162" font-size="11.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Sweep frequency + level</text><text x="828" y="178" font-size="11.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">with an accelerometer;</text><text x="828" y="194" font-size="11.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">confirm energy stays</text><text x="828" y="210" font-size="11.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">in-band.</text><text x="828" y="226" font-size="11.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif"></text><text x="828" y="242" font-size="11.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Then enable FFB and</text><text x="828" y="258" font-size="11.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">check the shaker does</text><text x="828" y="274" font-size="11.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">not mask FFB detail or</text><text x="828" y="290" font-size="11.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">shift pedal calibration.</text><text x="828" y="306" font-size="11.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif"></text><text x="828" y="322" font-size="11.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Any coupling is a</text><text x="828" y="338" font-size="11.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">mechanical problem to</text><text x="828" y="354" font-size="11.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">fix (isolation mounts).</text></svg>