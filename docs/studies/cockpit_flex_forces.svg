<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="Helvetica, Arial, sans-serif"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9,5 L0,9 Z" fill="#1E2530"/></marker></defs><rect x="0" y="0" width="1100" height="600" fill="#F7F5F0"/><text x="30" y="42" font-size="24" font-weight="bold" fill="#1E2530" font-family="Helvetica, Arial, sans-serif">Cockpit rigidity: where force goes in a stiff vs. flexible rig</text><text x="30" y="66" font-size="14" fill="#5A6270" font-family="Helvetica, Arial, sans-serif">A flexible frame silently absorbs FFB torque and brake force, blurring the driver's feel</text><text x="270" y="110" font-size="15" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Stiff rig (40x80mm+, gussets)</text><rect x="90" y="360" width="360" height="26" rx="0" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><polygon points="130,360 156,360 156,200 130,200" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5"/><rect x="120" y="170" width="56" height="34" rx="4" fill="#33587D" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="148" y="191" font-size="11" fill="white" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">base</text><circle cx="148" cy="148" r="18" fill="#F7F5F0" stroke="#1E2530" stroke-width="2.5" opacity="1"/><path d="M134,138 A 18 18 0 1 1 162,138" fill="none" stroke="#B4423A" stroke-width="2.5" marker-end="url(#arrow)"/><text x="148" y="122" font-size="11" fill="#B4423A" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">FFB torque</text><polygon points="340,360 430,310 442,326 352,376" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5"/><rect x="390" y="280" width="12" height="40" rx="2" fill="#4E7A4E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><line x1="430" y1="280" x2="396" y2="302" stroke="#33587D" stroke-width="2.5" marker-end="url(#arrow)"/><text x="436" y="276" font-size="11" fill="#33587D" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">brake force</text><rect x="240" y="335" width="70" height="20" rx="0" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><path d="M275,335 q -30,-40 -10,-70 l 30,0 q 10,40 -5,70 Z" fill="#8A93A0" stroke="#1E2530" stroke-width="1.5"/><text x="185" y="258" font-size="11" fill="#4E7A4E" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">rigid – force reaches</text><text x="185" y="274" font-size="11" fill="#4E7A4E" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">the driver intact</text><line x1="80" y1="386" x2="460" y2="386" stroke="#1E2530" stroke-width="2" stroke-linecap="butt"/><line x1="80" y1="386" x2="68" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="104" y1="386" x2="92" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="128" y1="386" x2="116" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="152" y1="386" x2="140" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="176" y1="386" x2="164" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="200" y1="386" x2="188" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="224" y1="386" x2="212" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="248" y1="386" x2="236" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="272" y1="386" x2="260" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="296" y1="386" x2="284" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="320" y1="386" x2="308" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="344" y1="386" x2="332" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="368" y1="386" x2="356" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="392" y1="386" x2="380" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="416" y1="386" x2="404" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="440" y1="386" x2="428" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><text x="800" y="110" font-size="15" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Flexible rig (undersized profile)</text><rect x="620" y="360" width="360" height="26" rx="0" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><polygon points="660,360 686,360 700,200 674,200" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5"/><rect x="664" y="170" width="56" height="34" rx="4" fill="#33587D" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="692" y="191" font-size="11" fill="white" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">base</text><circle cx="692" cy="148" r="18" fill="#F7F5F0" stroke="#1E2530" stroke-width="2.5" opacity="1"/><path d="M678,138 A 18 18 0 1 1 706,138" fill="none" stroke="#B4423A" stroke-width="2.5" marker-end="url(#arrow)"/><text x="692" y="122" font-size="11" fill="#B4423A" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">FFB torque</text><polygon points="870,360 960,310 972,326 882,376" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5"/><rect x="904" y="280" width="12" height="40" rx="2" fill="#4E7A4E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><line x1="960" y1="280" x2="910" y2="302" stroke="#33587D" stroke-width="2.5" marker-end="url(#arrow)"/><text x="966" y="276" font-size="11" fill="#33587D" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">brake force</text><rect x="770" y="335" width="70" height="20" rx="0" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><path d="M805,335 q -30,-40 -10,-70 l 30,0 q 10,40 -5,70 Z" fill="#8A93A0" stroke="#1E2530" stroke-width="1.5"/><path d="M673,280 q 20,-10 14,-30" fill="none" stroke="#C97A3E" stroke-width="2" stroke-dasharray="4,3"/><text x="715" y="250" font-size="11" fill="#8F4E23" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">upright flexes →</text><text x="715" y="266" font-size="11" fill="#8F4E23" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">torque lost</text><text x="870" y="410" font-size="11" fill="#8F4E23" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">deck flexes back →</text><text x="870" y="426" font-size="11" fill="#8F4E23" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">brake feel inconsistent</text><line x1="610" y1="386" x2="990" y2="386" stroke="#1E2530" stroke-width="2" stroke-linecap="butt"/><line x1="610" y1="386" x2="598" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="634" y1="386" x2="622" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="658" y1="386" x2="646" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="682" y1="386" x2="670" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="706" y1="386" x2="694" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="730" y1="386" x2="718" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="754" y1="386" x2="742" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="778" y1="386" x2="766" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="802" y1="386" x2="790" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="826" y1="386" x2="814" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="850" y1="386" x2="838" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="874" y1="386" x2="862" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="898" y1="386" x2="886" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="922" y1="386" x2="910" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="946" y1="386" x2="934" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><line x1="970" y1="386" x2="958" y2="398" stroke="#1E2530" stroke-width="1" stroke-linecap="butt"/><text x="30" y="470" font-size="13" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">In the stiff rig the red FFB torque and blue brake force transfer almost entirely to the driver's hands and feet.</text><text x="30" y="492" font-size="13" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">In the flexible rig part of that energy bends the frame instead (amber) — the wheel feels soft/delayed and braking becomes</text><text x="30" y="512" font-size="13" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">hard to repeat, which is exactly what ruins consistent trail-braking.</text></svg>