<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 640" font-family="Helvetica, Arial, sans-serif"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9,5 L0,9 Z" fill="#1E2530"/></marker></defs><rect x="0" y="0" width="1150" height="640" fill="#F7F5F0"/><text x="30" y="42" font-size="24" font-weight="bold" fill="#1E2530" font-family="Helvetica, Arial, sans-serif">Three-phase inverter driving the motor</text><text x="30" y="66" font-size="14" fill="#5A6270" font-family="Helvetica, Arial, sans-serif">Six MOSFETs in three half-bridges convert the DC bus into three-phase current for the PMSM</text><line x1="120" y1="120" x2="720" y2="120" stroke="#B4423A" stroke-width="3" stroke-linecap="butt"/><line x1="120" y1="520" x2="720" y2="520" stroke="#33587D" stroke-width="3" stroke-linecap="butt"/><text x="110" y="110" font-size="13" fill="#B4423A" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">DC bus +</text><text x="110" y="542" font-size="13" fill="#33587D" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">DC bus − (GND)</text><line x1="120" y1="120" x2="120" y2="300" stroke="#1E2530" stroke-width="2" stroke-linecap="butt"/><line x1="120" y1="520" x2="120" y2="340" stroke="#1E2530" stroke-width="2" stroke-linecap="butt"/><line x1="102" y1="300" x2="138" y2="300" stroke="#1E2530" stroke-width="3" stroke-linecap="butt"/><line x1="102" y1="315" x2="138" y2="315" stroke="#1E2530" stroke-width="3" stroke-linecap="butt"/><text x="50" y="322" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">DC link</text><text x="50" y="337" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">capacitor</text><line x1="280" y1="120" x2="280" y2="184" stroke="#1E2530" stroke-width="2" stroke-linecap="butt"/><rect x="258" y="184" width="44" height="52" rx="5" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="280" y="215" font-size="13" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Q1H</text><line x1="280" y1="236" x2="280" y2="404" stroke="#1E2530" stroke-width="2" stroke-linecap="butt"/><rect x="258" y="404" width="44" height="52" rx="5" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="280" y="435" font-size="13" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Q2L</text><line x1="280" y1="456" x2="280" y2="520" stroke="#1E2530" stroke-width="2" stroke-linecap="butt"/><circle cx="280" cy="320.0" r="4" fill="#1E2530" stroke="#1E2530" stroke-width="1.5" opacity="1"/><line x1="280" y1="320.0" x2="280" y2="286.0" stroke="#B4423A" stroke-width="2.5" stroke-linecap="butt"/><line x1="280" y1="286.0" x2="700" y2="286.0" stroke="#B4423A" stroke-width="2.5" stroke-linecap="butt"/><text x="288" y="280.0" font-size="12.5" fill="#B4423A" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Phase U</text><rect x="270" y="480.0" width="20" height="16" rx="2" fill="#C9A23E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="296" y="492.0" font-size="10" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">shunt</text><line x1="420" y1="120" x2="420" y2="184" stroke="#1E2530" stroke-width="2" stroke-linecap="butt"/><rect x="398" y="184" width="44" height="52" rx="5" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="420" y="215" font-size="13" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Q3H</text><line x1="420" y1="236" x2="420" y2="404" stroke="#1E2530" stroke-width="2" stroke-linecap="butt"/><rect x="398" y="404" width="44" height="52" rx="5" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="420" y="435" font-size="13" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Q4L</text><line x1="420" y1="456" x2="420" y2="520" stroke="#1E2530" stroke-width="2" stroke-linecap="butt"/><circle cx="420" cy="320.0" r="4" fill="#1E2530" stroke="#1E2530" stroke-width="1.5" opacity="1"/><line x1="420" y1="320.0" x2="420" y2="320.0" stroke="#4E7A4E" stroke-width="2.5" stroke-linecap="butt"/><line x1="420" y1="320.0" x2="700" y2="320.0" stroke="#4E7A4E" stroke-width="2.5" stroke-linecap="butt"/><text x="428" y="314.0" font-size="12.5" fill="#4E7A4E" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Phase V</text><rect x="410" y="480.0" width="20" height="16" rx="2" fill="#C9A23E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="436" y="492.0" font-size="10" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">shunt</text><line x1="560" y1="120" x2="560" y2="184" stroke="#1E2530" stroke-width="2" stroke-linecap="butt"/><rect x="538" y="184" width="44" height="52" rx="5" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="560" y="215" font-size="13" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Q5H</text><line x1="560" y1="236" x2="560" y2="404" stroke="#1E2530" stroke-width="2" stroke-linecap="butt"/><rect x="538" y="404" width="44" height="52" rx="5" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="560" y="435" font-size="13" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Q6L</text><line x1="560" 