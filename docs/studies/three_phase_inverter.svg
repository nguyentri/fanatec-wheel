font-size="16" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">PMSM</text><text x="850" y="338.0" font-size="12" fill="#5A6270" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">motor</text><line x1="700" y1="286.0" x2="792" y2="290.0" stroke="#B4423A" stroke-width="2.5" stroke-linecap="butt"/><line x1="700" y1="320.0" x2="792" y2="320.0" stroke="#4E7A4E" stroke-width="2.5" stroke-linecap="butt"/><line x1="700" y1="354.0" x2="792" y2="350.0" stroke="#33587D" stroke-width="2.5" stroke-linecap="butt"/><rect x="940" y="120" width="200" height="380" rx="8" fill="#EFEBE1" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="960" y="150" font-size="14" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">How it works</text><text x="960" y="172" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Each phase has a high-side</text><text x="960" y="191" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">and low-side switch (a</text><text x="960" y="210" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">"half-bridge").</text><text x="960" y="229" font-size="12.5" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif"></text><text x="960" y="248" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Turning the right pair on/off</text><text x="960" y="267" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">at high PWM frequency sets</text><text x="960" y="286" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">each phase voltage.</text><text x="960" y="305" font-size="12.5" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif"></text><text x="960" y="324" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">The two switches in a leg are</text><text x="960" y="343" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">NEVER on together — a small</text><text x="960" y="362" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">dead-time gap prevents</text><text x="960" y="381" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">shoot-through (a direct DC</text><text x="960" y="400" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">bus short).</text><text x="960" y="419" font-size="12.5" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif"></text><text x="960" y="438" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Low-side shunts measure</text><text x="960" y="457" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">phase current for the FOC</text><text x="960" y="476" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">current loop.</text></svg>