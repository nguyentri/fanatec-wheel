 rx="8" fill="#EFEBE1" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="780" y="428" font-size="14" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Key ideas</text><text x="780" y="452" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">• Duty cycle = fraction of each PWM</text><text x="780" y="469" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">   period the high-side switch is on.</text><text x="780" y="486" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">• Sampling current at the carrier peak</text><text x="780" y="503" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">   avoids the switching-edge noise.</text><text x="780" y="520" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">• Dead-time briefly turns BOTH switches</text><text x="780" y="537" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">   off between transitions so they never</text><text x="780" y="554" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">   short the DC bus (shoot-through).</text></svg>