<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 620"><rect x="0" y="0" width="1150" height="620" fill="#F7F5F0"/><text x="30" y="42" font-size="24" font-weight="bold" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">Potentiometer vs. rotary encoder</text><text x="30" y="66" font-size="14" fill="#555" font-family="Helvetica,Arial,sans-serif">Two ways to turn rotation into an electrical signal</text><text x="60" y="115" font-size="16" font-weight="bold" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">A. Potentiometer (resistive, contact wear)</text><path d="M 175.15,384.85 A 120,120 0 1 1 344.85,384.85" fill="none" stroke="#C97A3E" stroke-width="16" stroke-linecap="round"/><text x="346.0" y="177.1" font-size="12.5" fill="#1E2530" text-anchor="middle" font-family="Helvetica,Arial,sans-serif">resistive track</text><circle cx="175.1" cy="384.9" r="6" fill="#1E2530"/><circle cx="344.9" cy="384.9" r="6" fill="#1E2530"/><text x="120.1" y="389.9" font-size="12.5" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">GND</text><text x="354.9" y="389.9" font-size="12.5" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">V+</text><line x1="260" y1="300" x2="219.6" y2="189.1" stroke="#33587D" stroke-width="5" stroke-linecap="round"/><circle cx="260" cy="300" r="14" fill="#B9C2CC" stroke="#1E2530" stroke-width="2"/><text x="260" y="345" font-size="12.5" fill="#1E2530" text-anchor="middle" font-family="Helvetica,Arial,sans-serif">shaft + wiper</text><text x="201.2" y="138.4" font-size="12.5" fill="#33587D" text-anchor="middle" font-family="Helvetica,Arial,sans-serif">wiper (V_out)</text><text x="60" y="480" font-size="13" fill="#1E2530" font-family="Helvetica,Arial,sans-serif" font-weight="bold">V_out = V+ × (wiper position / full track)</text><text x="60" y="505" font-size="12.5" fill="#555" font-family="Helvetica,Arial,sans-serif">Simple voltage divider — cheap and easy to read with an ADC.</text><text x="60" y="525" font-size="12.5" fill="#555" font-family="Helvetica,Arial,sans-serif">The wiper physically rubs the track, so it wears, and can develop dead spots or noise over time.</text><text x="640" y="115" font-size="16" font-weight="bold" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">B. Incremental encoder (contactless slits, A/B quadrature)</text><path d="M 960.00,300.00 A 120.00,120.00 0 0 1 958.97,315.66 L 909.40,309.14 A 70.00,70.00 0 0 0 910.00,300.00 Z" fill="#3A4048" stroke="none"/><path d="M 955.91,331.06 A 120.00,120.00 0 0 1 950.87,345.92 L 904.67,326.79 A 70.00,70.00 0 0 0 907.61,318.12 Z" fill="#3A4048" stroke="none"/><path d="M 943.92,360.00 A 120.00,120.00 0 0 1 935.20,373.05 L 895.53,342.61 A 70.00,70.00 0 0 0 900.62,335.00 Z" fill="#3A4048" stroke="none"/><path d="M 924.85,384.85 A 120.00,120.00 0 0 1 913.05,395.20 L 882.61,355.53 A 70.00,70.00 0 0 0 889.50,349.50 Z" fill="#3A4048" stroke="none"/><path d="M 900.00,403.92 A 120.00,120.00 0 0 1 885.92,410.87 L 866.79,364.67 A 70.00,70.00 0 0 0 875.00,360.62 Z" fill="#3A4048" stroke="none"/><path d="M 871.06,415.91 A 120.00,120.00 0 0 1 855.66,418.97 L 849.14,369.40 A 70.00,70.00 0 0 0 858.12,367.61 Z" fill="#3A4048" stroke="none"/><path d="M 840.00,420.00 A 120.00,120.00 0 0 1 824.34,418.97 L 830.86,369.40 A 70.00,70.00 0 0 0 840.00,370.00 Z" fill="#3A4048" stroke="none"/><path d="M 808.94,415.91 A 120.00,120.00 0 0 1 794.08,410.87 L 813.21,364.67 A 70.00,70.00 0 0 0 821.88,367.61 Z" fill="#3A4048" stroke="none"/><path d="M 780.00,403.92 A 120.00,120.00 0 0 1 766.95,395.20 L 797.39,355.53 A 70.00,70.00 0 0 0 805.00,360.62 Z" fill="#3A4048" stroke="none"/><path d="M 755.15,384.85 A 120.00,120.00 0 0 1 744.80,373.05 L 784.47,342.61 A 70.00,70.00 0 0 0 790.50,349.50 Z" fill="#3A4048" stroke="none"/><path d="M 736.08,360.00 A 120.00,120.00 0 0 1 729.13,345.92 L 775.33,326.79 A 70.00,70.00 0 0 0 779.38,335.00 Z" fill="#3A4048" stroke="none"/><path d="M 724.09,331.06 A 120.00,120.00 0 0 1 721.03,315.66 L 770.60,309.14 A 70.00,70.00 0 0 0 772.39,318.12 Z" fill="#3A4048" stroke="none"/><path d="M 720.00,300.00 A 120.00,120.00 0 0 1 721.03,284.34 L 770.60,290.86 A 70.00,70.00 0 0 0 770.00,300.00 Z" fill="#3A4048" stroke="none"/><path d="M 724.09,268.94 A 120.00,120.00 0 0 1 729.13,254.08 L 775.33,273.21 A 70.00,70.00 0 0 0 772.39,281.88 Z" fill="#3A4048" stroke="none"/><path d="M 736.08,240.00 A 120.00,120.00 0 0 1 744.80,226.95 L 784.47,257.39 A 70.00,70.00 0 0 0 779.38,265.00 Z" fill="#3A4048" stroke="none"/><path d="M 755.15,215.15 A 120.00,120.00 0 0 1 766.95,204.80 L 797.39,244.47 A 70.00,70.00 0 0 0 790.50,250.50 Z" fill="#3A4048" stroke="none"/><path d="M 780.00,196.08 A 120.00,120.00 0 0 1 794.08,189.13 L 813.21,235.33 A 70.00,70.00 0 0 0 805.00,239.38 Z" fill="#3A4048" stroke="none"/><path d="M 808.94,184.09 A 120.00,120.00 0 0 1 824.34,181.03 L 830.86,230.60 A 70.00,70.00 0 0 0 821.88,232.39 Z" fill="#3A4048" stroke="none"/><path d="M 840.00,180.00 A 120.00,120.00 0 0 1 855.66,181.03 L 849.14,230.60 A 70.00,70.00 0 0 0 840.00,230.00 Z" fill="#3A4048" stroke="none"/><path d="M 871.06,184.09 A 120.00,120.00 0 0 1 885.92,189.13 L 866.79,235.33 A 70.00,70.00 0 0 0 858.12,232.39 Z" fill="#3A4048" stroke="none"/><path d="M 900.00,196.08 A 120.00,120.00 0 0 1 913.05,204.80 L 882.61,244.47 A 70.00,70.00 0 0 0 875.00,239.38 Z" fill="#3A4048" stroke="none"/><path d="M 924.85,215.15 A 120.00,120.00 0 0 1 935.20,226.95 L 895.53,257.39 A 70.00,70.00 0 0 0 889.50,250.50 Z" fill="#3A4048" stroke="none"/><path d="M 943.92,240.00 A 120.00,120.00 0 0 1 950.87,254.08 L 904.67,273.21 A 70.00,70.00 0 0 0 900.62,265.00 Z" fill="#3A4048" stroke="none"/><path d="M 955.91,268.94 A 120.00,120.00 0 0 1 958.97,284.34 L 909.40,290.86 A 70.00,70.00 0 0 0 907.61,281.88 Z" fill="#3A4048" stroke="none"/><circle cx="840" cy="300" r="70" fill="none" stroke="#1E2530" stroke-width="1.5"/><circle cx="840" cy="300" r="120" fill="none" stroke="#1E2530" stroke-width="1.5"/><circle cx="840" cy="300" r="16" fill="#B9C2CC" stroke="#1E2530" stroke-width="2"/><text x="840" y="160" font-size="12.5" fill="#1E2530" text-anchor="middle" font-family="Helvetica,Arial,sans-serif">code disc (slotted)</text><circle cx="933.6" cy="213.5" r="7" fill="#B4423A"/><circle cx="933.6" cy="353.5" r="7" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5"/><line x1="933.6" y1="220.5" x2="933.6" y2="346.5" stroke="#1E2530" stroke-width="1" stroke-dasharray="2,3" opacity="0.5"/><text x="948.6" y="218.5" font-size="12" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">LED (Ch. A)</text><text x="948.6" y="358.5" font-size="12" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">photodetector</text><text x="640" y="480" font-size="13" fill="#1E2530" font-family="Helvetica,Arial,sans-serif" font-weight="bold">Counts slits to measure angle; A/B phase order gives direction</text><text x="640" y="505" font-size="12.5" fill="#555" font-family="Helvetica,Arial,sans-serif">No contact with the disc — an optical or magnetic beam is interrupted by each slit/pole.</text><text x="640" y="525" font-size="12.5" fill="#555" font-family="Helvetica,Arial,sans-serif">Absolute encoders (SPI/SSI/BiSS-C) add a coded track</text><text x="640" y="543" font-size="12.5" fill="#555" font-family="Helvetica,Arial,sans-serif">so angle is known instantly at power-up.</text><text x="640" y="567" font-size="12" fill="#555" font-family="Helvetica,Arial,sans-serif">Ch. A/B quadrature (90° phase offset encodes direction):</text><path d="M 900.0,596.0 L 900.0,596.0 L 900.0,582.0 L 912.0,582.0 L 912.0,596.0 L 924.0,596.0 L 924.0,582.0 L 936.0,582.0 L 936.0,596.0 L 948.0,596.0 L 948.0,582.0 L 960.0,582.0 L 960.0,596.0 L 972.0,596.0 L 972.0,582.0 L 984.0,582.0 L 984.0,596.0 L 996.0,596.0 L 996.0,582.0 L 1008.0,582.0 L 1008.0,596.0 L 1020.0,596.0 L 1020.0,582.0 L 1032.0,582.0 L 1032.0,596.0 L 1044.0,596.0 L 1044.0,582.0 L 1056.0,582.0 L 1056.0,596.0" fill="none" stroke="#C97A3E" stroke-width="2.5" stroke-linejoin="round"/><path d="M 900.0,618.0 L 906.0,618.0 L 906.0,618.0 L 918.0,618.0 L 918.0,604.0 L 930.0,604.0 L 930.0,618.0 L 942.0,618.0 L 942.0,604.0 L 954.0,604.0 L 954.0,618.0 L 966.0,618.0 L 966.0,604.0 L 978.0,604.0 L 978.0,618.0 L 990.0,618.0 L 990.0,604.0 L 1002.0,604.0 L 1002.0,618.0 L 1014.0,618.0 L 1014.0,604.0 L 1026.0,604.0 L 1026.0,618.0 L 1038.0,618.0 L 1038.0,604.0 L 1050.0,604.0 L 1050.0,618.0" fill="none" stroke="#33587D" stroke-width="2.5" stroke-linejoin="round"/><text x="1064" y="590" font-size="12" fill="#C97A3E" font-family="Helvetica,Arial,sans-serif">A</text><text x="1064" y="612" font-size="12" fill="#33587D" font-family="Helvetica,Arial,sans-serif">B</text></svg>