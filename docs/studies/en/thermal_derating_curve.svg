<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1030 580" font-family="Helvetica, Arial, sans-serif"><defs></defs><rect x="0" y="0" width="1030" height="580" fill="#F7F5F0"/><text x="30" y="42" font-size="24" font-weight="bold" fill="#1E2530" font-family="Helvetica, Arial, sans-serif">Thermal derating: torque limit falls as the motor heats up</text><text x="30" y="66" font-size="14" fill="#5A6270" font-family="Helvetica, Arial, sans-serif">Firmware trims the maximum allowed torque before anything is damaged</text><line x1="165" y1="440" x2="165" y2="110" stroke="#1E2530" stroke-width="1.5" stroke-linecap="butt"/><line x1="165" y1="440" x2="780" y2="440" stroke="#1E2530" stroke-width="1.5" stroke-linecap="butt"/><text x="472.5" y="482" font-size="13" fill="#1E2530" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Motor / inverter temperature →</text><text x="70" y="275.0" font-size="13" fill="#1E2530" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Allowed torque</text><text x="95" y="291.0" font-size="13" fill="#1E2530" text-anchor="middle" font-family="Helvetica, Arial, sans-serif">(% of max)</text><line x1="165" y1="440" x2="780" y2="440" stroke="#D8D4CA" stroke-width="1" stroke-linecap="butt"/><text x="153" y="444" font-size="11" fill="#5A6270" text-anchor="end" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">0%</text><line x1="165" y1="275.0" x2="780" y2="275.0" stroke="#D8D4CA" stroke-width="1" stroke-linecap="butt"/><text x="153" y="279.0" font-size="11" fill="#5A6270" text-anchor="end" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">50%</text><line x1="165" y1="110.0" x2="780" y2="110.0" stroke="#D8D4CA" stroke-width="1" stroke-linecap="butt"/><text x="153" y="114.0" font-size="11" fill="#5A6270" text-anchor="end" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">100%</text><rect x="165" y="110" width="276.75" height="330" rx="0" fill="#DDE7DD" stroke="none" stroke-width="1.5" opacity="0.6"/><rect x="441.75" y="110" width="227.54999999999995" height="330" rx="0" fill="#F2E6CC" stroke="none" stroke-width="1.5" opacity="0.7"/><rect x="669.3" y="110" width="110.70000000000005" height="330" rx="0" fill="#F0DAD7" stroke="none" stroke-width="1.5" opacity="0.7"/><text x="303.375" y="102" font-size="12" fill="#4E7A4E" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">normal</text><text x="555.525" y="102" font-size="12" fill="#8F4E23" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">derating</text><text x="724.65" y="102" font-size="12" fill="#B4423A" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">cut off</text><polyline points="165.0,110.0 441.8,110.0 669.3,440.0 780.0,440.0" fill="none" stroke="#1E2530" stroke-width="3" stroke-linejoin="round"/><line x1="441.75" y1="440" x2="441.75" y2="110" stroke="#B4423A" stroke-width="1" stroke-dasharray="4,4" stroke-linecap="butt"/><line x1="669.3" y1="440" x2="669.3" y2="110" stroke="#B4423A" stroke-width="1" stroke-dasharray="4,4" stroke-linecap="butt"/><text x="441.75" y="458" font-size="11" fill="#B4423A" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">derate start</text><text x="669.3" y="458" font-size="11" fill="#B4423A" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">shutdown temp</text><text x="165" y="500" font-size="12.5" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Recovery uses hysteresis: torque is only restored after the temperature</text><text x="165" y="518" font-size="12.5" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">drops well back below the derate-start point.</text><rect x="812" y="110" width="185" height="330" rx="8" fill="#EFEBE1" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="829" y="138" font-size="14" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Why derate?</text><text x="829" y="162" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">More torque needs</text><text x="829" y="181" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">more current, and</text><text x="829" y="200" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">current heats the</text><text x="829" y="219" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">motor and MOSFETs</text><text x="829" y="238" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">(T ≈ Kt × Iq).</text><text x="829" y="257" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif"></text><text x="829" y="276" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Rather than fail</text><text x="829" y="295" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">suddenly at the</text><text x="829" y="314" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">limit, firmware</text><text x="829" y="333" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">smoothly lowers the</text><text x="829" y="352" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">torque ceiling so the</text><text x="829" y="371" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">wheel stays usable</text><text x="829" y="390" font-size="12.5" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">and safe as it warms.</text></svg>