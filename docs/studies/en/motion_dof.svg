<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 620" font-family="Helvetica, Arial, sans-serif"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9,5 L0,9 Z" fill="#1E2530"/></marker></defs><rect x="0" y="0" width="1050" height="620" fill="#F7F5F0"/><text x="30" y="42" font-size="24" font-weight="bold" fill="#1E2530" font-family="Helvetica, Arial, sans-serif">Six degrees of freedom (6-DOF) of a motion platform</text><text x="30" y="66" font-size="14" fill="#5A6270" font-family="Helvetica, Arial, sans-serif">Three linear axes (surge, sway, heave) and three rotations (pitch, roll, yaw)</text><polygon points="282.5,359.2 432.5,359.2 432.5,289.2 282.5,289.2" fill="#8A93A0" stroke="#1E2530" stroke-width="1.5" opacity="1"/><polygon points="327.5,390.8 282.5,359.2 282.5,289.2 327.5,320.8" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><polygon points="327.5,320.8 477.5,320.8 432.5,289.2 282.5,289.2" fill="#CDD5DE" stroke="#1E2530" stroke-width="1.5" opacity="1"/><polygon points="327.5,390.8 477.5,390.8 477.5,320.8 327.5,320.8" fill="#33587D" stroke="#1E2530" stroke-width="1.5" opacity="0.85"/><text x="357.5" y="355.75" font-size="12" fill="white" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">cockpit</text><line x1="380.0" y1="340.0" x2="510.0" y2="340.0" stroke="#B4423A" stroke-width="3" marker-end="url(#arrow)"/><text x="515.0" y="345.0" font-size="13" fill="#B4423A" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">surge (X)</text><line x1="380.0" y1="340.0" x2="290.0" y2="385.0" stroke="#B4423A" stroke-width="3" marker-end="url(#arrow)"/><text x="0" y="0" font-size="13" fill="#B4423A" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif"></text><line x1="380.0" y1="340.0" x2="380.0" y2="210.0" stroke="#4E7A4E" stroke-width="3" marker-end="url(#arrow)"/><text x="340.0" y="205.0" font-size="13" fill="#4E7A4E" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">heave (Y)</text><line x1="380.0" y1="340.0" x2="380.0" y2="460.0" stroke="#4E7A4E" stroke-width="3" marker-end="url(#arrow)"/><text x="0" y="0" font-size="13" fill="#4E7A4E" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif"></text><line x1="380.0" y1="340.0" x2="310.0" y2="302.0" stroke="#33587D" stroke-width="3" marker-end="url(#arrow)"/><text x="230.0" y="298.0" font-size="13" fill="#33587D" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">sway (Z)</text><line x1="380.0" y1="340.0" x2="450.0" y2="378.0" stroke="#33587D" stroke-width="3" marker-end="url(#arrow)"/><text x="0" y="0" font-size="13" fill="#33587D" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif"></text><rect x="680" y="110" width="340" height="430" rx="10" fill="#EFEBE1" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="700" y="140" font-size="15" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">What each axis feels like</text><circle cx="706" cy="171" r="8" fill="#B4423A" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="724" y="175" font-size="14" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Surge</text><text x="724" y="193" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">fore/aft – accel and braking push</text><circle cx="706" cy="229" r="8" fill="#33587D" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="724" y="233" font-size="14" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Sway</text><text x="724" y="251" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">side/side – cornering load</text><circle cx="706" cy="287" r="8" fill="#4E7A4E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="724" y="291" font-size="14" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Heave</text><text x="724" y="309" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">up/down – bumps, crests, dips</text><circle cx="706" cy="345" r="8" fill="#7A5C99" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="724" y="349" font-size="14" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Pitch</text><text x="724" y="367" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">nose up/down – accel squat, brake dive</text><circle cx="706" cy="403" r="8" fill="#C97A3E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="724" y="407" font-size="14" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Roll</text><text x="724" y="425" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">lean into corners</text><circle cx="706" cy="461" r="8" fill="#C9A23E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="724" y="465" font-size="14" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Yaw</text><text x="724" y="483" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">rotation – oversteer / spin onset</text><text x="30" y="560" font-size="12.5" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Small rigs often actuate only a subset (commonly pitch + roll, or heave); larger platforms add more. Actual DOF and travel are platform-specific.</text><path d="M350,230 A 24 24 0 1 1 398,230" fill="none" stroke="#7A5C99" stroke-width="2.5" marker-end="url(#arrow)"/><text x="290" y="220" font-size="12" fill="#7A5C99" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">pitch</text><path d="M498,380 A 22 22 0 1 1 542,380" fill="none" stroke="#C97A3E" stroke-width="2.5" marker-end="url(#arrow)"/><text x="530" y="420" font-size="12" fill="#C97A3E" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">roll</text><path d="M208,430 A 22 22 0 1 1 252,430" fill="none" stroke="#C9A23E" stroke-width="2.5" marker-end="url(#arrow)"/><text x="170" y="435" font-size="12" fill="#C9A23E" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">yaw</text></svg>