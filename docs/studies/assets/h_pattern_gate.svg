<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="Helvetica, Arial, sans-serif"><defs></defs><rect x="0" y="0" width="1000" height="600" fill="#F7F5F0"/><text x="30" y="42" font-size="24" font-weight="bold" fill="#1E2530" font-family="Helvetica, Arial, sans-serif">H-pattern shifter gate</text><text x="30" y="66" font-size="14" fill="#5A6270" font-family="Helvetica, Arial, sans-serif">The gate plate physically constrains the lever to valid gear positions</text><rect x="180" y="150" width="420" height="320" rx="14" fill="#EFEBE1" stroke="#1E2530" stroke-width="1.5" opacity="1"/><line x1="270" y1="210" x2="270" y2="410" stroke="#B9C2CC" stroke-width="26" stroke-linecap="round"/><line x1="390" y1="210" x2="390" y2="410" stroke="#B9C2CC" stroke-width="26" stroke-linecap="round"/><line x1="510" y1="210" x2="510" y2="410" stroke="#B9C2CC" stroke-width="26" stroke-linecap="round"/><line x1="270" y1="310.0" x2="510" y2="310.0" stroke="#B9C2CC" stroke-width="26" stroke-linecap="round"/><circle cx="270" cy="210" r="15" fill="#F7F5F0" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="270" y="215" font-size="15" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">1</text><circle cx="270" cy="410" r="15" fill="#F7F5F0" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="270" y="415" font-size="15" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">2</text><circle cx="390" cy="210" r="15" fill="#F7F5F0" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="390" y="215" font-size="15" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">3</text><circle cx="390" cy="410" r="15" fill="#F7F5F0" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="390" y="415" font-size="15" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">4</text><circle cx="510" cy="210" r="15" fill="#F7F5F0" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="510" y="215" font-size="15" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">5</text><circle cx="510" cy="410" r="15" fill="#F7F5F0" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="510" y="415" font-size="15" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">6</text><text x="390" y="315.0" font-size="14" fill="#5A6270" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">N</text><line x1="390" y1="210" x2="390" y2="155" stroke="#1E2530" stroke-width="6" stroke-linecap="round"/><circle cx="390" cy="142" r="18" fill="#B4423A" stroke="#1E2530" stroke-width="2" opacity="1"/><text x="460" y="146" font-size="12" fill="#B4423A" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">lever in 3rd</text><circle cx="292" cy="232" r="5" fill="#33587D" stroke="#1E2530" stroke-width="1" opacity="1"/><circle cx="292" cy="432" r="5" fill="#33587D" stroke="#1E2530" stroke-width="1" opacity="1"/><circle cx="412" cy="232" r="5" fill="#33587D" stroke="#1E2530" stroke-width="1" opacity="1"/><circle cx="412" cy="432" r="5" fill="#33587D" stroke="#1E2530" stroke-width="1" opacity="1"/><circle cx="532" cy="232" r="5" fill="#33587D" stroke="#1E2530" stroke-width="1" opacity="1"/><circle cx="532" cy="432" r="5" fill="#33587D" stroke="#1E2530" stroke-width="1" opacity="1"/><text x="620" y="240" font-size="12.5" fill="#33587D" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">● microswitch or Hall</text><text x="630" y="258" font-size="12.5" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">sensor at each position</text><rect x="615" y="290" width="205" height="240" rx="8" fill="#EFEBE1" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="632" y="318" font-size="14" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">How it works</text><text x="632" y="342" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">The plate limits where</text><text x="632" y="359" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">the lever can go, so</text><text x="632" y="376" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">only real gear slots are</text><text x="632" y="393" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">reachable.</text><text x="632" y="410" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif"></text><text x="632" y="427" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Firmware reads which</text><text x="632" y="444" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">position switch is</text><text x="632" y="461" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">closed, rejects</text><text x="632" y="478" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">impossible combos,</text><text x="632" y="495" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">and debounces the</text><text x="632" y="512" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">state change.</text><text x="180" y="526" font-size="12.5" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Sequential mode blocks the sideways channel, leaving only one up/down lane (push = up, pull = down).</text></svg>