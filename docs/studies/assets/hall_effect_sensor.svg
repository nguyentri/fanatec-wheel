<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 600"><defs><marker id="farrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#7A5C99"/></marker></defs><rect x="0" y="0" width="1120" height="600" fill="#F7F5F0"/><text x="30" y="42" font-size="24" font-weight="bold" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">Hall-effect sensor: contactless position sensing</text><text x="30" y="66" font-size="14" fill="#555" font-family="Helvetica,Arial,sans-serif">A magnet moves with the pedal/lever; the fixed sensor reads the changing magnetic field — no physical contact, no wear</text><text x="40" y="110" font-size="16" font-weight="bold" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">A. Magnet travels past a fixed sensor</text><line x1="100" y1="230" x2="560" y2="230" stroke="#1E2530" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.6"/><text x="100" y="215" font-size="12.5" fill="#555" font-family="Helvetica,Arial,sans-serif">pedal / lever travel path</text><rect x="133.0" y="207.0" width="27.0" height="46" fill="#B4423A" stroke="#1E2530" stroke-width="1.5" opacity="0.35"/><rect x="160" y="207.0" width="27.0" height="46" fill="#33587D" stroke="#1E2530" stroke-width="1.5" opacity="0.35"/><rect x="303.0" y="207.0" width="27.0" height="46" fill="#B4423A" stroke="#1E2530" stroke-width="1.5" opacity="1.0"/><rect x="330" y="207.0" width="27.0" height="46" fill="#33587D" stroke="#1E2530" stroke-width="1.5" opacity="1.0"/><text x="316.5" y="235" font-size="15" font-weight="bold" fill="white" text-anchor="middle" opacity="1.0">N</text><text x="343.5" y="235" font-size="15" font-weight="bold" fill="white" text-anchor="middle" opacity="1.0">S</text><rect x="473.0" y="207.0" width="27.0" height="46" fill="#B4423A" stroke="#1E2530" stroke-width="1.5" opacity="0.35"/><rect x="500" y="207.0" width="27.0" height="46" fill="#33587D" stroke="#1E2530" stroke-width="1.5" opacity="0.35"/><text x="160" y="270" font-size="11.5" fill="#888" text-anchor="middle" font-family="Helvetica,Arial,sans-serif">pedal released</text><text x="330" y="270" font-size="11.5" fill="#1E2530" text-anchor="middle" font-family="Helvetica,Arial,sans-serif">mid-travel</text><text x="500" y="270" font-size="11.5" fill="#888" text-anchor="middle" font-family="Helvetica,Arial,sans-serif">pedal pressed</text><path d="M 316,253 Q 302,300 330,345" fill="none" stroke="#7A5C99" stroke-width="2" opacity="0.75" marker-end="url(#farrow)"/><path d="M 330,253 Q 330,300 330,345" fill="none" stroke="#7A5C99" stroke-width="2" opacity="0.75" marker-end="url(#farrow)"/><path d="M 344,253 Q 358,300 330,345" fill="none" stroke="#7A5C99" stroke-width="2" opacity="0.75" marker-end="url(#farrow)"/><rect x="300" y="345" width="60" height="30" rx="4" fill="#B9C2CC" stroke="#1E2530" stroke-width="2"/><circle cx="330" cy="360" r="4" fill="#1E2530"/><text x="330" y="337" font-size="12.5" fill="#1E2530" text-anchor="middle" font-family="Helvetica,Arial,sans-serif">Hall IC</text><line x1="312" y1="375" x2="312" y2="410" stroke="#1E2530" stroke-width="2"/><line x1="330" y1="375" x2="330" y2="410" stroke="#1E2530" stroke-width="2"/><line x1="348" y1="375" x2="348" y2="410" stroke="#1E2530" stroke-width="2"/><rect x="270" y="410" width="120" height="18" fill="#4E7A4E" stroke="#1E2530" stroke-width="1.5"/><text x="330" y="450" font-size="12" fill="#1E2530" text-anchor="middle" font-family="Helvetica,Arial,sans-serif">VCC        OUT        GND</text><text x="330" y="470" font-size="12" fill="#555" text-anchor="middle" font-family="Helvetica,Arial,sans-serif">(fixed to pedal frame / PCB)</text><text x="40" y="510" font-size="12.5" fill="#555" font-family="Helvetica,Arial,sans-serif">No mechanical contact between magnet and sensor → nothing to wear out.</text><text x="40" y="530" font-size="12.5" fill="#555" font-family="Helvetica,Arial,sans-serif">Accuracy depends on correct magnet size, gap, and alignment to the sensor.</text><text x="700" y="110" font-size="16" font-weight="bold" fill="#1E2530" font-family="Helvetica,Arial,sans-serif">B. Typical output vs. position</text><line x1="700" y1="430" x2="700" y2="140" stroke="#1E2530" stroke-width="1.5"/><line x1="700" y1="430" x2="1060" y2="430" stroke="#1E2530" stroke-width="1.5"/><text x="880.0" y="465" font-size="13" fill="#1E2530" text-anchor="middle" font-family="Helvetica,Arial,sans-serif">Magnet position (pedal travel)</text><text x="680" y="285.0" font-size="13" fill="#1E2530" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" transform="rotate(-90 680 285.0)">Sensor output voltage</text><rect x="800.8" y="140" width="158.4000000000001" height="290" fill="#E4DCC8" opacity="0.6"/><text x="880.0" y="130" font-size="12" fill="#1E2530" text-anchor="middle" font-family="Helvetica,Arial,sans-serif">usable linear range</text><path d="M 710.0,407.2 L 715.7,406.8 L 721.3,406.2 L 727.0,405.6 L 732.7,404.9 L 738.3,404.1 L 744.0,403.2 L 749.7,402.2 L 755.3,400.9 L 761.0,399.5 L 766.7,397.9 L 772.3,396.1 L 778.0,393.9 L 783.7,391.5 L 789.3,388.8 L 795.0,385.7 L 800.7,382.2 L 806.3,378.2 L 812.0,373.8 L 817.7,368.9 L 823.3,363.5 L 829.0,357.5 L 834.7,351.0 L 840.3,343.9 L 846.0,336.3 L 851.7,328.2 L 857.3,319.6 L 863.0,310.7 L 868.7,301.5 L 874.3,292.0 L 880.0,282.5 L 885.7,273.0 L 891.3,263.5 L 897.0,254.3 L 902.7,245.4 L 908.3,236.8 L 914.0,228.7 L 919.7,221.1 L 925.3,214.0 L 931.0,207.5 L 936.7,201.5 L 942.3,196.1 L 948.0,191.2 L 953.7,186.8 L 959.3,182.8 L 965.0,179.3 L 970.7,176.2 L 976.3,173.5 L 982.0,171.1 L 987.7,168.9 L 993.3,167.1 L 999.0,165.5 L 1004.7,164.1 L 1010.3,162.8 L 1016.0,161.8 L 1021.7,160.9 L 1027.3,160.1 L 1033.0,159.4 L 1038.7,158.8 L 1044.3,158.2 L 1050.0,157.8" fill="none" stroke="#C97A3E" stroke-width="3.5" stroke-linejoin="round"/><line x1="800.8" y1="430" x2="800.8" y2="140" stroke="#1E2530" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/><line x1="959.2" y1="430" x2="959.2" y2="140" stroke="#1E2530" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/><text x="700" y="535" font-size="12.5" fill="#555" font-family="Helvetica,Arial,sans-serif">Outside the shaded band the output saturates —</text><text x="700" y="553" font-size="12.5" fill="#555" font-family="Helvetica,Arial,sans-serif">calibration should keep travel inside it.</text><text x="700" y="578" font-size="12.5" fill="#555" font-family="Helvetica,Arial,sans-serif">(Digital Hall switches output a clean on/off</text><text x="700" y="596" font-size="12.5" fill="#555" font-family="Helvetica,Arial,sans-serif">step instead of this curve.)</text></svg>