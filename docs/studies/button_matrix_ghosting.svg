<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 600" font-family="Helvetica, Arial, sans-serif"><defs></defs><rect x="0" y="0" width="1150" height="600" fill="#F7F5F0"/><text x="30" y="42" font-size="24" font-weight="bold" fill="#1E2530" font-family="Helvetica, Arial, sans-serif">Button matrix and anti-ghosting diodes</text><text x="30" y="66" font-size="14" fill="#5A6270" font-family="Helvetica, Arial, sans-serif">Why pressing three buttons can create a phantom fourth — and how a diode per switch fixes it</text><text x="285.0" y="126" font-size="15" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Without diodes</text><line x1="150" y1="150" x2="150" y2="360" stroke="#33587D" stroke-width="2" stroke-linecap="butt"/><text x="150" y="144" font-size="11" fill="#33587D" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">C1</text><line x1="240" y1="150" x2="240" y2="360" stroke="#33587D" stroke-width="2" stroke-linecap="butt"/><text x="240" y="144" font-size="11" fill="#33587D" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">C2</text><line x1="330" y1="150" x2="330" y2="360" stroke="#33587D" stroke-width="2" stroke-linecap="butt"/><text x="330" y="144" font-size="11" fill="#33587D" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">C3</text><line x1="120" y1="150" x2="330" y2="150" stroke="#B4423A" stroke-width="2" stroke-linecap="butt"/><text x="110" y="154" font-size="11" fill="#B4423A" text-anchor="end" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">R1</text><line x1="120" y1="240" x2="330" y2="240" stroke="#B4423A" stroke-width="2" stroke-linecap="butt"/><text x="110" y="244" font-size="11" fill="#B4423A" text-anchor="end" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">R2</text><line x1="120" y1="330" x2="330" y2="330" stroke="#B4423A" stroke-width="2" stroke-linecap="butt"/><text x="110" y="334" font-size="11" fill="#B4423A" text-anchor="end" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">R3</text><circle cx="172" cy="150" r="9" fill="#C9A23E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><circle cx="262" cy="150" r="9" fill="#C9A23E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><circle cx="352" cy="150" r="9" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><circle cx="172" cy="240" r="9" fill="#C9A23E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><circle cx="262" cy="240" r="9" fill="#B4423A" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="262" y="224" font-size="10" fill="#B4423A" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">phantom!</text><circle cx="352" cy="240" r="9" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><circle cx="172" cy="330" r="9" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><circle cx="262" cy="330" r="9" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><circle cx="352" cy="330" r="9" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="90" y="470" font-size="12.5" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Pressing R1C1, R1C2, R1C3-style combos lets current sneak</text><text x="90" y="488" font-size="12.5" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">through a back-path, so the scan reads a 4th key that isn't pressed.</text><text x="855.0" y="126" font-size="15" fill="#1E2530" text-anchor="middle" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">With a diode per switch</text><line x1="720" y1="150" x2="720" y2="360" stroke="#33587D" stroke-width="2" stroke-linecap="butt"/><text x="720" y="144" font-size="11" fill="#33587D" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">C1</text><line x1="810" y1="150" x2="810" y2="360" stroke="#33587D" stroke-width="2" stroke-linecap="butt"/><text x="810" y="144" font-size="11" fill="#33587D" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">C2</text><line x1="900" y1="150" x2="900" y2="360" stroke="#33587D" stroke-width="2" stroke-linecap="butt"/><text x="900" y="144" font-size="11" fill="#33587D" text-anchor="middle" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">C3</text><line x1="690" y1="150" x2="900" y2="150" stroke="#B4423A" stroke-width="2" stroke-linecap="butt"/><text x="680" y="154" font-size="11" fill="#B4423A" text-anchor="end" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">R1</text><line x1="690" y1="240" x2="900" y2="240" stroke="#B4423A" stroke-width="2" stroke-linecap="butt"/><text x="680" y="244" font-size="11" fill="#B4423A" text-anchor="end" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">R2</text><line x1="690" y1="330" x2="900" y2="330" stroke="#B4423A" stroke-width="2" stroke-linecap="butt"/><text x="680" y="334" font-size="11" fill="#B4423A" text-anchor="end" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">R3</text><circle cx="742" cy="150" r="9" fill="#C9A23E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><path d="M736,164 L748,164 L742,174 Z" fill="#1E2530"/><line x1="742" y1="174" x2="742" y2="180" stroke="#1E2530" stroke-width="1.5" stroke-linecap="butt"/><circle cx="832" cy="150" r="9" fill="#C9A23E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><path d="M826,164 L838,164 L832,174 Z" fill="#1E2530"/><line x1="832" y1="174" x2="832" y2="180" stroke="#1E2530" stroke-width="1.5" stroke-linecap="butt"/><circle cx="922" cy="150" r="9" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><path d="M916,164 L928,164 L922,174 Z" fill="#1E2530"/><line x1="922" y1="174" x2="922" y2="180" stroke="#1E2530" stroke-width="1.5" stroke-linecap="butt"/><circle cx="742" cy="240" r="9" fill="#C9A23E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><path d="M736,254 L748,254 L742,264 Z" fill="#1E2530"/><line x1="742" y1="264" x2="742" y2="270" stroke="#1E2530" stroke-width="1.5" stroke-linecap="butt"/><circle cx="832" cy="240" r="9" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><path d="M826,254 L838,254 L832,264 Z" fill="#1E2530"/><line x1="832" y1="264" x2="832" y2="270" stroke="#1E2530" stroke-width="1.5" stroke-linecap="butt"/><circle cx="922" cy="240" r="9" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><path d="M916,254 L928,254 L922,264 Z" fill="#1E2530"/><line x1="922" y1="264" x2="922" y2="270" stroke="#1E2530" stroke-width="1.5" stroke-linecap="butt"/><circle cx="742" cy="330" r="9" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><path d="M736,344 L748,344 L742,354 Z" fill="#1E2530"/><line x1="742" y1="354" x2="742" y2="360" stroke="#1E2530" stroke-width="1.5" stroke-linecap="butt"/><circle cx="832" cy="330" r="9" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><path d="M826,344 L838,344 L832,354 Z" fill="#1E2530"/><line x1="832" y1="354" x2="832" y2="360" stroke="#1E2530" stroke-width="1.5" stroke-linecap="butt"/><circle cx="922" cy="330" r="9" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><path d="M916,344 L928,344 L922,354 Z" fill="#1E2530"/><line x1="922" y1="354" x2="922" y2="360" stroke="#1E2530" stroke-width="1.5" stroke-linecap="butt"/><text x="660" y="470" font-size="12.5" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Each diode allows current one way only, blocking the sneak path.</text><text x="660" y="488" font-size="12.5" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">The same three presses now read correctly — no phantom key.</text><circle cx="120" cy="540" r="8" fill="#C9A23E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="135" y="545" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">pressed</text><circle cx="250" cy="540" r="8" fill="#B4423A" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="265" y="545" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">phantom (false) press</text><circle cx="500" cy="540" r="8" fill="#B9C2CC" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="515" y="545" font-size="12" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">not pressed</text></svg>