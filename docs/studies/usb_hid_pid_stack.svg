<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 660" font-family="Helvetica, Arial, sans-serif"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9,5 L0,9 Z" fill="#1E2530"/></marker></defs><rect x="0" y="0" width="1050" height="660" fill="#F7F5F0"/><text x="30" y="42" font-size="24" font-weight="bold" fill="#1E2530" font-family="Helvetica, Arial, sans-serif">The sim-racing communication stack (PC link)</text><text x="30" y="66" font-size="14" fill="#5A6270" font-family="Helvetica, Arial, sans-serif">Each layer only talks to the one directly above and below it — like a network stack</text><rect x="90" y="110" width="700" height="74" rx="8" fill="#EFEBE1" stroke="#33587D" stroke-width="2.5" opacity="1"/><rect x="90" y="110" width="12" height="74" rx="0" fill="#33587D" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="118" y="140" font-size="15" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Application</text><text x="118" y="164" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">game  ·  config / tuning tool  ·  telemetry tool (SimHub)</text><line x1="820" y1="178" x2="820" y2="198" stroke="#1E2530" stroke-width="1.6" marker-end="url(#arrow)"/><line x1="842" y1="198" x2="842" y2="178" stroke="#8A93A0" stroke-width="1.6" marker-end="url(#arrow)"/><rect x="90" y="192" width="700" height="74" rx="8" fill="#EFEBE1" stroke="#4E7A4E" stroke-width="2.5" opacity="1"/><rect x="90" y="192" width="12" height="74" rx="0" fill="#4E7A4E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="118" y="222" font-size="15" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">OS input and FFB API</text><text x="118" y="246" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">DirectInput · GameInput · XInput* · Raw Input  |  Linux evdev + FF + libinput / hidraw  |  macOS IOKit  |  SDL</text><line x1="820" y1="260" x2="820" y2="280" stroke="#1E2530" stroke-width="1.6" marker-end="url(#arrow)"/><line x1="842" y1="280" x2="842" y2="260" stroke="#8A93A0" stroke-width="1.6" marker-end="url(#arrow)"/><rect x="90" y="274" width="700" height="74" rx="8" fill="#EFEBE1" stroke="#C97A3E" stroke-width="2.5" opacity="1"/><rect x="90" y="274" width="12" height="74" rx="0" fill="#C97A3E" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="118" y="304" font-size="15" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Device-class protocol</text><text x="118" y="328" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">USB HID (axes/buttons)  ·  HID-PID (force feedback)  ·  USB CDC (serial)  ·  USB DFU (update)</text><line x1="820" y1="342" x2="820" y2="362" stroke="#1E2530" stroke-width="1.6" marker-end="url(#arrow)"/><line x1="842" y1="362" x2="842" y2="342" stroke="#8A93A0" stroke-width="1.6" marker-end="url(#arrow)"/><rect x="90" y="356" width="700" height="74" rx="8" fill="#EFEBE1" stroke="#7A5C99" stroke-width="2.5" opacity="1"/><rect x="90" y="356" width="12" height="74" rx="0" fill="#7A5C99" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="118" y="386" font-size="15" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Transport</text><text x="118" y="410" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">USB Full/High Speed  ·  Bluetooth / BLE  ·  Ethernet / Wi-Fi (IP)  ·  UDP / shared memory (host side)</text><line x1="820" y1="424" x2="820" y2="444" stroke="#1E2530" stroke-width="1.6" marker-end="url(#arrow)"/><line x1="842" y1="444" x2="842" y2="424" stroke="#8A93A0" stroke-width="1.6" marker-end="url(#arrow)"/><rect x="90" y="438" width="700" height="74" rx="8" fill="#EFEBE1" stroke="#B4423A" stroke-width="2.5" opacity="1"/><rect x="90" y="438" width="12" height="74" rx="0" fill="#B4423A" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="118" y="468" font-size="15" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Data-link / framing</text><text x="118" y="492" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">USB packets  ·  SPI frames + CRC  ·  CAN frames  ·  UART framing  ·  RS-485</text><line x1="820" y1="506" x2="820" y2="526" stroke="#1E2530" stroke-width="1.6" marker-end="url(#arrow)"/><line x1="842" y1="526" x2="842" y2="506" stroke="#8A93A0" stroke-width="1.6" marker-end="url(#arrow)"/><rect x="90" y="520" width="700" height="74" rx="8" fill="#EFEBE1" stroke="#8A93A0" stroke-width="2.5" opacity="1"/><rect x="90" y="520" width="12" height="74" rx="0" fill="#8A93A0" stroke="#1E2530" stroke-width="1.5" opacity="1"/><text x="118" y="550" font-size="15" fill="#1E2530" text-anchor="start" font-weight="bold" font-style="normal" font-family="Helvetica, Arial, sans-serif">Physical</text><text x="118" y="574" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">USB D+/D−  ·  3.3V SPI over the QR  ·  differential CAN / RS-485  ·  I2C  ·  analog rails</text><text x="808" y="96" font-size="11" fill="#1E2530" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">down: host → device</text><text x="808" y="112" font-size="11" fill="#8A93A0" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">up: device → host</text><text x="90" y="626" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">* XInput exposes only a fixed Xbox-gamepad model with rumble — no directional force feedback, so wheels are poorly served by it.</text><text x="90" y="646" font-size="12" fill="#5A6270" text-anchor="start" font-weight="normal" font-style="normal" font-family="Helvetica, Arial, sans-serif">Consoles use licensed accessory paths instead; those must not be emulated or bypassed.</text></svg>